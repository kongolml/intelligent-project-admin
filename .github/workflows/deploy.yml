name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          PAYLOAD_WEBHOOK_SECRET: ${{ secrets.PAYLOAD_WEBHOOK_SECRET }}
          FRONTEND_URL: http://localhost:3001
          DIGITALOCEAN_SPACE_REGION: fra1
          DIGITALOCEAN_SPACE_ENDPOINT: https://fra1.digitaloceanspaces.com
          DIGITALOCEAN_SPACE_BUCKET: intelligent-project
          DIGITALOCEAN_SPACE_HOST: fra1.digitaloceanspaces.com

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_HOST_KEY }}" >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          echo "${{ secrets.DROPLET_SSH_KEY }}" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Sync build to Droplet
        run: |
          rsync -az --delete --exclude='.env' -e "ssh -p ${{ secrets.DROPLET_SSH_PORT }}" \
            .next/standalone/ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/intelligent-project-adm/
          rsync -az --delete -e "ssh -p ${{ secrets.DROPLET_SSH_PORT }}" \
            .next/static/ \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/intelligent-project-adm/.next/static/
          if [ -d public ]; then
            rsync -az --delete -e "ssh -p ${{ secrets.DROPLET_SSH_PORT }}" \
              public/ \
              ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/intelligent-project-adm/public/
          fi

      - name: Write .env to Droplet
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
          PAYLOAD_WEBHOOK_SECRET: ${{ secrets.PAYLOAD_WEBHOOK_SECRET }}
        run: |
          printf '%s\n' \
            "NODE_ENV=production" \
            "PORT=3000" \
            "DATABASE_URL=$DATABASE_URL" \
            "PAYLOAD_SECRET=$PAYLOAD_SECRET" \
            "S3_ACCESS_KEY=$S3_ACCESS_KEY" \
            "S3_SECRET_KEY=$S3_SECRET_KEY" \
            "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL" \
            "PAYLOAD_WEBHOOK_SECRET=$PAYLOAD_WEBHOOK_SECRET" \
            "FRONTEND_URL=http://localhost:3001" \
            "DIGITALOCEAN_SPACE_REGION=fra1" \
            "DIGITALOCEAN_SPACE_ENDPOINT=https://fra1.digitaloceanspaces.com" \
            "DIGITALOCEAN_SPACE_BUCKET=intelligent-project" \
            "DIGITALOCEAN_SPACE_HOST=fra1.digitaloceanspaces.com" \
          | ssh -p ${{ secrets.DROPLET_SSH_PORT }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "cat > /var/www/intelligent-project-adm/.env && chmod 600 /var/www/intelligent-project-adm/.env"

      - name: Restart PM2
        run: |
          ssh -p ${{ secrets.DROPLET_SSH_PORT }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
            "bash -lc 'pm2 restart intelligent-project-adm \
              || pm2 start /var/www/intelligent-project-adm/server.js \
                   --name intelligent-project-adm \
                   --cwd /var/www/intelligent-project-adm'"
